<!DOCTYPE html>
<html>
<head>
    <title>Stress Predictor</title>
    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">
    <h1>🎓 Student Stress Predictor</h1>

    <!-- STUDY -->


    <div class="label-box">
        <span>📘 Study</span>
        <span id="studyVal">0</span>
    </div>
    <input type="range" id="study" min="0" max="10" oninput="updateValue('study')">

    <!-- SLEEP -->
    <div class="label-box">
        <span>😴 Sleep</span>
        <span id="sleepVal">0</span>
    </div>
    <input type="range" id="sleep" min="0" max="10" oninput="updateValue('sleep')">

    <!-- SOCIAL -->
    <div class="label-box">
        <span>👥 Social</span>
        <span id="socialVal">0</span>
    </div>
    <input type="range" id="social" min="0" max="10" oninput="updateValue('social')">

    <!-- SCREEN -->
    <div class="label-box">
        <span>📱 Screen</span>
        <span id="screenVal">0</span>
    </div>
    <input type="range" id="screen" min="0" max="10" oninput="updateValue('screen')">

    <!-- EXAM -->
    <div class="label-box">
        <span>📝 Exam</span>
        <span id="examVal">0</span>
    </div>
    <input type="range" id="exam" min="0" max="10" oninput="updateValue('exam')">

    <button onclick="predict()">🚀 Predict Stress</button>

    <!-- RESULT -->
<h2 id="result"></h2>

    <!-- SUGGESTIONS CARD -->
    <div class="suggestion-box" id="suggestionBox">
        <h3>📊 Suggestions</h3>
        <p id="bfs"></p>
        <p id="dfs"></p>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
